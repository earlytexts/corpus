name: "Publish"

on:
  workflow_run:
    workflows: ["Test"]
    types: ["completed"]
    branches: ["main"]

jobs:
  publish-jsr:
    if: "github.event.workflow_run.conclusion == 'success'"
    runs-on: "ubuntu-latest"

    permissions:
      contents: "read"
      id-token: "write" # OIDC authentication with JSR

    steps:
      - name: "Clone repository"
        uses: "actions/checkout@v6"
        with:
          ref: "${{ github.event.workflow_run.head_sha }}"

      - name: "Setup Deno"
        uses: "denoland/setup-deno@v2"
        with:
          deno-version: "v2.x"

      - name: "Publish to JSR"
        run: "deno publish"
