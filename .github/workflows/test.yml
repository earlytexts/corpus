name: "Test"

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: "ubuntu-latest"

    steps:
      - uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version: "24"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci"

      - name: "Type check"
        run: "npm run check"

      - name: "Check formatting"
        run: "npm run format:check"

      - name: "Run tests"
        run: "npm test"

      - name: "Validate corpus"
        run: "npm run validate"
