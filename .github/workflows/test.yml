name: "Test"

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Clone repository"
        uses: "actions/checkout@v6"

      - name: "Setup Deno"
        uses: "denoland/setup-deno@v2"
        with:
          deno-version: "v2.x"

      - name: "Type checking, linting, and format checking"
        run: "deno task check"

      - name: "Run tests"
        run: "deno task test"

      - name: "Validate corpus"
        run: "deno task validate"

      - name: "Build catalogue"
        run: "deno task build"

      - name: "Publish dry run"
        run: "deno publish --dry-run"
