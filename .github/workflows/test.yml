name: "Test"

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Clone repository"
        uses: "actions/checkout@v6"

      - name: "Setup Deno"
        uses: "denoland/setup-deno@v2"
        with:
          deno-version: "v2.x"

      - name: "Type checking and linting"
        run: "deno task check"

      - name: "Format checking"
        run: "deno task fmt:check"

      - name: "Run tests (unit + corpus validation)"
        run: "deno task test"

      - name: "Build catalogue"
        run: "deno task build"

      - name: "Publish dry run"
        run: "deno publish --dry-run"

  test-compositor:
    runs-on: "ubuntu-latest"

    steps:
      - uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "compositor/package-lock.json"

      - name: "Install dependencies"
        run: "cd compositor && npm ci"

      - name: "Run tests"
        run: "cd compositor && npm test"

      - name: "Type checking"
        run: "cd compositor && npm run check"

      - name: "Format checking"
        run: "cd compositor && npm run fmt:check"
